<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketNexus | Value Chain Explorer</title>
    
    <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="ambient-orb"></div>
    <div id="p5-canvas-container"></div>
    
    <header class="navbar">
        <div class="logo-group">
            <button id="sidebarToggle" class="sidebar-toggle" aria-label="Toggle Sidebar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <div class="logo" id="brandLogo" title="Reset Intelligence Engine">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                <span>MarketNexus</span>
            </div>
        </div>
        
        <div class="search-container">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="searchInput" placeholder="Explore Themes: 'defence', 'EV', 'banking', 'aerospace'...">
        </div>
    </header>

    <div class="layout">
        <aside id="sidebar" class="sidebar">
            <div class="filter-header">
                <h2>Advanced Filters</h2>
                <button id="resetFilters" class="btn-text">Clear</button>
            </div>
            
            <div class="filter-group">
                <label>Sort Stocks By</label>
                <select id="sortSelect" class="dropdown">
                    <option value="cap-desc">Market Cap (High to Low)</option>
                    <option value="cap-asc">Market Cap (Low to High)</option>
                    <option value="name-asc">Company (A-Z)</option>
                </select>
            </div>
            <hr class="divider">

            <div id="facetsContainer" class="facets-container"></div>
        </aside>

        <main class="main-content">
            <div class="breadcrumb-nav" id="breadcrumbNav">
                </div>
            
            <div class="content-header">
                <div>
                    <h1 class="page-title" id="pageTitle">Themes</h1>
                    <p id="resultCount" class="result-count">Synchronizing data stream...</p>
                </div>

                <div class="header-actions">
                    <button id="exportCSV" class="btn-secondary" aria-label="Export filtered results">Export CSV</button>
                    <label class="slider-label" for="effectStrength">3D intensity</label>
                    <input id="effectStrength" type="range" min="0" max="1" step="0.1" value="0.9" />
                </div>
            </div>
            
            <div id="loader" class="loader-container">
                <div class="spinner"></div>
                <h2>Mapping Value Chains...</h2>
            </div>
            
            <div id="noResults" class="state-container hidden">
                <div class="icon">🔍</div>
                <h2>No intelligence found</h2>
                <p>Try adjusting your search terms or clearing your filters.</p>
            </div>

            <div id="grid" class="grid hidden"></div>
        </main>
    </div>

    <div id="drawerBackdrop" class="drawer-backdrop hidden">
        <aside id="detailDrawer" class="drawer">
            <div class="drawer-header">
                <div class="drawer-title-group">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <span class="pulse-dot"></span>
                        <span id="drawerSymbol" class="drawer-ticker"></span>
                    </div>
                    <h2 id="drawerName"></h2>
                </div>
                <button id="closeDrawer" class="drawer-close" aria-label="Close details">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            
            <div class="drawer-body">
                <div class="drawer-hero">
                    <div class="hero-metric">
                        <span class="hero-label">Market Capitalization</span>
                        <span id="drawerCap" class="hero-value"></span>
                    </div>
                </div>
                
                <div class="drawer-meta" id="drawerMetaGrid"></div>
                
                <div class="drawer-prose">
                    <div class="prose-section">
                        <h3>Specific Products</h3>
                        <div id="drawerProducts" class="prose-content"></div>
                    </div>
                    <div class="prose-section">
                        <h3>Specific Services</h3>
                        <div id="drawerServices" class="prose-content"></div>
                    </div>
                    <div class="prose-section">
                        <h3>Operational Capacity</h3>
                        <p id="drawerCapacity" class="prose-text"></p>
                    </div>
                    <div class="prose-section">
                        <h3>Search Engine Aliases</h3>
                        <div id="drawerTags" class="drawer-tags"></div>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <script src="app.js"></script>
</body>
</html>
